<nav class="site-nav" id="site-nav">
  <div class="nav-inner">
    <a href="{{ '/' | relative_url }}" class="nav-logo"><span>{{ site.title }}</span></a>
    <ul class="nav-links" id="nav-links">
      {% for item in site.nav_pages %}
        {% assign is_active = false %}
        {% if page.url == item.url %}{% assign is_active = true %}{% endif %}
        {% if page.url == item.url | append: '/' %}{% assign is_active = true %}{% endif %}
        <li>
          <a href="{{ item.url | relative_url }}"
             data-gradient="{{ item.gradient }}"
             {% if is_active %}class="active"{% endif %}>{{ item.title }}</a>
        </li>
      {% endfor %}
    </ul>
    <button class="nav-hamburger" id="nav-hamburger" aria-label="Toggle menu" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</nav>

<script>
  (function() {
    var nav = document.getElementById('site-nav');
    var btn = document.getElementById('nav-hamburger');
    if (!btn) return;
    btn.addEventListener('click', function() {
      var open = nav.classList.toggle('menu-open');
      btn.setAttribute('aria-expanded', open);
    });
    document.addEventListener('click', function(e) {
      if (!nav.contains(e.target)) {
        nav.classList.remove('menu-open');
        btn.setAttribute('aria-expanded', 'false');
      }
    });
  })();
</script>
