title: Latent Space
description: "the space between human and machine"
url: "https://www.iluvex.com"
baseurl: ""

author:
  name: luvex
  email: maxin_kevin@hotmail.com
  github: luvex
  weibo: "http://www.weibo.com/u/1609515304"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight

# Excerpt separator
excerpt_separator: <!--more-->

# Pagination
paginate: 6
paginate_path: "/:num"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-seo-tag

# Collections
collections:
  pages:
    output: true
    permalink: /:name

# Navigation
nav_pages:
  - title: AI Zone
    url: /ai
    gradient: ai
  - title: Travel
    url: /travel
    gradient: travel
  - title: Thoughts
    url: /thoughts
    gradient: thoughts
  - title: About
    url: /about
    gradient: profile

# Section metadata (used by layouts)
sections:
  ai:
    title: AI Zone
    emoji: "🤖"
    tagline: "Learning in the age of intelligence"
    gradient: ai
  travel:
    title: Travel
    emoji: "✈️"
    tagline: "Adventures across the world"
    gradient: travel
  thoughts:
    title: Thoughts
    emoji: "💭"
    tagline: "Reflections on life, technology, and the world"
    gradient: thoughts

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - .gitignore
  - vendor
  - README.md
